<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Dashboard | Bed Linen And Beyond</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { font-family: 'Montserrat', sans-serif; }
    .heading-font { font-family: 'Cormorant Garamond', serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- ── Auth Guard Overlay ──────────────────────────────────
       Covers the entire page while Firebase checks if the
       owner is logged in. admin.js removes it on success,
       or redirects to login.html on failure.
       This prevents a "flash" of the dashboard to strangers.
  ─────────────────────────────────────────────────────────── -->
  <div id="auth-loading" class="fixed inset-0 bg-white z-[999] flex items-center justify-center">
    <div class="text-center">
      <i class="fa-solid fa-spinner fa-spin text-2xl text-gray-300 mb-4 block"></i>
      <p class="text-xs text-gray-400 tracking-widest uppercase">Verifying access...</p>
    </div>
  </div>

  <!-- ── Navigation ──────────────────────────────────────── -->
  <nav class="bg-white border-b border-gray-100 px-6 py-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">

      <h1 class="heading-font text-2xl tracking-widest uppercase">Admin Dashboard</h1>

      <div class="flex items-center space-x-6">
        <!-- Shows the logged-in email -->
        <span id="admin-email" class="text-xs text-gray-400 hidden md:block italic"></span>
        <a href="index.html" class="text-xs uppercase tracking-widest text-gray-400 hover:text-black transition">
          View Storefront
        </a>
        <!-- Logout -->
        <button
          onclick="logout()"
          class="text-xs uppercase tracking-widest text-red-400 hover:text-red-600 transition flex items-center space-x-1">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>Logout</span>
        </button>
      </div>

    </div>
  </nav>

  <!-- ── Main Content ─────────────────────────────────────── -->
  <div class="max-w-7xl mx-auto px-6 py-12">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">

      <!-- ─── LEFT COLUMN: Add New Product ─── -->
      <div class="lg:col-span-1">
        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 sticky top-6">
          <h2 class="heading-font text-3xl mb-8">Add New Product</h2>

          <form id="add-product-form" class="space-y-6">

            <!-- Name -->
            <div>
              <label class="text-[10px] uppercase tracking-widest text-gray-400 mb-2 block">
                Product Name *
              </label>
              <input
                type="text"
                id="prod-name"
                required
                placeholder="e.g. Egyptian Cotton Duvet Cover"
                class="w-full border-b border-gray-200 py-2 focus:outline-none focus:border-black transition font-light text-sm"
              >
            </div>

            <!-- Price -->
            <div>
              <label class="text-[10px] uppercase tracking-widest text-gray-400 mb-2 block">
                Price (€) *
              </label>
              <input
                type="number"
                id="prod-price"
                step="0.01"
                min="0"
                required
                placeholder="0.00"
                class="w-full border-b border-gray-200 py-2 focus:outline-none focus:border-black transition font-light text-sm"
              >
            </div>

            <!-- Description -->
            <div>
              <label class="text-[10px] uppercase tracking-widest text-gray-400 mb-2 block">
                Short Description
              </label>
              <input
                type="text"
                id="prod-desc"
                maxlength="80"
                placeholder="e.g. 500 thread count. Pure luxury."
                class="w-full border-b border-gray-200 py-2 focus:outline-none focus:border-black transition font-light text-sm"
              >
              <p class="text-[10px] text-gray-300 mt-1">Shown under the product name. Max 80 characters.</p>
            </div>

            <!-- Image Upload -->
            <div>
              <label class="text-[10px] uppercase tracking-widest text-gray-400 mb-2 block">
                Product Image *
              </label>

              <!-- Styled file drop zone -->
              <label for="prod-image" class="block cursor-pointer group">
                <div class="border-2 border-dashed border-gray-200 group-hover:border-black transition p-8 text-center rounded">
                  <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-300 group-hover:text-black transition mb-3 block"></i>
                  <p class="text-xs text-gray-400 mb-1">Click to choose an image</p>
                  <p class="text-[10px] text-gray-300">JPG, PNG, WEBP — max 5 MB</p>
                </div>
                <!-- Hidden real input -->
                <input type="file" id="prod-image" accept="image/*" required class="hidden">
              </label>

              <!-- Preview (shown after image is selected) -->
              <div id="image-preview" class="hidden mt-4">
                <img id="preview-img" src="" alt="Preview"
                  class="w-full h-44 object-cover rounded border border-gray-100">
                <p class="text-[10px] text-green-600 mt-2">
                  <i class="fa-solid fa-check mr-1"></i>Image selected — ready to upload
                </p>
              </div>
            </div>

            <!-- Upload Progress -->
            <div id="progress-container" class="hidden">
              <div class="flex justify-between items-center mb-1">
                <span id="progress-label" class="text-[10px] text-gray-400 uppercase tracking-widest">Uploading...</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-1.5">
                <div
                  id="progress-bar"
                  class="bg-black h-1.5 rounded-full transition-all duration-300"
                  style="width: 0%">
                </div>
              </div>
            </div>

            <!-- Submit -->
            <button
              type="submit"
              id="submit-btn"
              class="w-full bg-black text-white py-4 tracking-widest uppercase text-xs
                     hover:bg-gray-800 transition shadow-lg
                     disabled:opacity-50 disabled:cursor-not-allowed
                     flex items-center justify-center space-x-2"
            >
              <i class="fa-solid fa-cloud-arrow-up"></i>
              <span>Upload Product</span>
            </button>

          </form>
        </div>
      </div>

      <!-- ─── RIGHT COLUMN: Manage Products ─── -->
      <div class="lg:col-span-2">
        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
          <h2 class="heading-font text-3xl mb-8">Inventory Management</h2>

          <div id="admin-product-list" class="space-y-6">
            <!-- admin.js injects product rows here -->
            <div class="text-center py-12">
              <i class="fa-solid fa-spinner fa-spin text-xl text-gray-300 mb-3 block"></i>
              <p class="text-sm text-gray-400">Loading inventory...</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Toast Notification ──────────────────────────────── -->
  <div id="toast"
    class="fixed bottom-6 right-6 z-50 bg-black text-white px-6 py-4 shadow-xl
           flex items-center space-x-3
           translate-x-[150%] transition-transform duration-500 max-w-sm">
    <i id="toast-icon" class="fa-solid fa-check text-green-400 flex-shrink-0"></i>
    <span id="toast-message" class="text-sm leading-relaxed"></span>
  </div>

  <!-- ✅ Firebase SDKs — all 4 needed for admin -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
