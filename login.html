<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Login | Bed Linen And Beyond</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { font-family: 'Montserrat', sans-serif; }
    .heading-font { font-family: 'Cormorant Garamond', serif; }
    .login-bg {
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url('https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?auto=format&fit=crop&q=80&w=2000');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="min-h-screen login-bg flex items-center justify-center p-6">

  <div class="w-full max-w-md">

    <!-- ── Login Card ─────────────────────────────── -->
    <div class="bg-white p-10 md:p-12 shadow-2xl">

      <!-- Logo / Brand -->
      <div class="text-center mb-10">
        <h1 class="heading-font text-4xl tracking-widest uppercase mb-2">
          Bed Linen <span class="text-gray-400">&</span> Beyond
        </h1>
        <p class="text-[10px] uppercase tracking-[0.3em] text-gray-400">Owner Access Portal</p>
        <div class="w-12 h-px bg-gray-200 mx-auto mt-5"></div>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="space-y-8" novalidate>

        <!-- Email -->
        <div>
          <label class="text-[10px] uppercase tracking-widest text-gray-400 mb-2 block">
            Email Address
          </label>
          <input
            type="email"
            id="login-email"
            required
            autocomplete="email"
            placeholder="your@email.com"
            class="w-full border-b border-gray-200 py-3 text-sm font-light
                   focus:outline-none focus:border-black transition placeholder-gray-300"
          >
        </div>

        <!-- Password -->
        <div>
          <label class="text-[10px] uppercase tracking-widest text-gray-400 mb-2 block">
            Password
          </label>
          <div class="relative">
            <input
              type="password"
              id="login-password"
              required
              autocomplete="current-password"
              placeholder="••••••••"
              class="w-full border-b border-gray-200 py-3 text-sm font-light
                     focus:outline-none focus:border-black transition placeholder-gray-300 pr-10"
            >
            <!-- Show/hide password toggle -->
            <button
              type="button"
              onclick="togglePasswordVisibility()"
              class="absolute right-0 top-3 text-gray-300 hover:text-black transition"
              title="Show/hide password"
            >
              <i id="eye-icon" class="fa-solid fa-eye text-sm"></i>
            </button>
          </div>
        </div>

        <!-- Error Box (hidden by default) -->
        <div id="error-box" class="hidden bg-red-50 border border-red-100 rounded px-4 py-3 flex items-start space-x-3">
          <i class="fa-solid fa-circle-exclamation text-red-400 mt-0.5 flex-shrink-0 text-sm"></i>
          <span id="error-text" class="text-red-600 text-xs leading-relaxed"></span>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="login-btn"
          class="w-full bg-black text-white py-4 text-xs uppercase tracking-[0.2em]
                 hover:bg-gray-800 transition
                 disabled:opacity-60 disabled:cursor-not-allowed
                 flex items-center justify-center space-x-2"
        >
          <i id="btn-icon" class="fa-solid fa-right-to-bracket"></i>
          <span id="btn-text">Enter Dashboard</span>
        </button>

      </form>
    </div>

    <!-- Back to shop -->
    <div class="text-center mt-6">
      <a href="index.html" class="text-white/50 hover:text-white text-[10px] uppercase tracking-widest transition">
        ← Back to Shop
      </a>
    </div>

  </div>

<!-- Firebase SDKs — all 3 needed because firebase-config.js uses firestore() -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
